name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libfontconfig1-dev libx11-dev libxdo-dev libgtk-3-dev libayatana-appindicator3-dev

    - name: Build
      run: cargo build --release

    - name: Rename binaries (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: mv target/release/audio-selector target/release/audio-selector-linux

    - name: Rename binaries (Windows)
      if: matrix.os == 'windows-latest'
      run: move target/release/audio-selector.exe target/release/audio-selector-windows.exe

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: audio-selector-${{ matrix.os }}
        path: |
          target/release/audio-selector-linux
          target/release/audio-selector-windows.exe

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/audio-selector-ubuntu-latest/audio-selector-linux
            ./artifacts/audio-selector-windows-latest/audio-selector-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
